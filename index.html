<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FestivalYa - Gestión Técnica de Eventos</title>

    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="icons/icon-16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FestivalYa">
    <meta name="theme-color" content="#0a0a0b">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0b;
            --bg-elevated: #131317;
            --bg-card: #17181d;
            --bg-card-hover: #1c1d23;
            --accent-gold: #d9a935;
            --accent-gold-bright: #f2c85c;
            --accent-gold-dim: rgba(217, 169, 53, 0.12);
            --text-main: #f5f5f6;
            --text-muted: #8b8d97;
            --text-faint: #55575f;
            --border: #26272e;
            --border-soft: #1d1e24;
            --danger: #e5484d;
            --danger-dim: rgba(229, 72, 77, 0.12);
            --success: #34d399;
            --shadow-lg: 0 20px 40px -12px rgba(0, 0, 0, 0.6);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            background-image:
                radial-gradient(circle at 15% 0%, rgba(217, 169, 53, 0.06), transparent 40%),
                radial-gradient(circle at 85% 100%, rgba(217, 169, 53, 0.04), transparent 45%);
            background-attachment: fixed;
            color: var(--text-main);
            padding-bottom: 96px;
            -webkit-font-smoothing: antialiased;
        }

        .icon {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        .icon-lg {
            width: 21px;
            height: 21px;
        }

        /* --- HEADER & CONTROLES --- */
        header {
            padding: 16px 15px 14px;
            background: rgba(19, 19, 23, 0.85);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--border-soft);
            display: flex;
            flex-direction: column;
            gap: 14px;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 999;
        }

        .logo-row {
            display: flex;
            justify-content: space-between;
            width: 100%;
            align-items: center;
            max-width: 520px;
        }

        .logo-img {
            height: 26px;
            width: auto;
            display: block;
        }

        .btn-danger-sm {
            background: var(--danger-dim);
            color: var(--danger);
            border: 1px solid rgba(229, 72, 77, 0.35);
            padding: 6px 11px;
            border-radius: 7px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-danger-sm:hover {
            background: rgba(229, 72, 77, 0.2);
            border-color: var(--danger);
        }

        .event-selector-zone {
            display: flex;
            gap: 8px;
            width: 100%;
            max-width: 520px;
        }

        select, input, textarea {
            background: var(--bg-elevated);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 11px 12px;
            border-radius: 8px;
            font-size: 13px;
            font-family: inherit;
            outline: none;
            width: 100%;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }

        select:focus, input:focus, textarea:focus {
            border-color: var(--accent-gold);
            box-shadow: 0 0 0 3px var(--accent-gold-dim);
        }

        input::placeholder, textarea::placeholder {
            color: var(--text-faint);
        }

        input:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-add-event {
            background: linear-gradient(135deg, var(--accent-gold-bright), var(--accent-gold));
            color: #14120a;
            border: none;
            padding: 0 16px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            font-size: 13px;
            width: auto;
            white-space: nowrap;
            transition: filter 0.15s ease, transform 0.1s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-add-event:hover { filter: brightness(1.08); }
        .btn-add-event:active { transform: scale(0.97); }

        /* --- CONTENEDOR DE SECCIONES --- */
        .app-page {
            display: none;
            padding: 22px 15px;
            max-width: 520px;
            margin: 0 auto;
        }

        .app-page.active {
            display: block;
            animation: fadeIn 0.25s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-bottom: 16px;
            font-weight: 700;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        h2::before {
            content: "";
            width: 3px;
            height: 14px;
            background: linear-gradient(180deg, var(--accent-gold-bright), var(--accent-gold));
            border-radius: 2px;
            display: inline-block;
        }

        h3.section-subhead {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            color: var(--accent-gold-bright);
            display: flex;
            align-items: center;
            gap: 7px;
            margin: 18px 0 10px;
        }

        /* --- FORMULARIOS --- */
        .card-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .form-card {
            background: var(--bg-card);
            border: 1px solid var(--border-soft);
            border-radius: 12px;
            padding: 15px;
            transition: border-color 0.15s ease, background 0.15s ease;
        }

        .form-card:focus-within {
            border-color: rgba(217, 169, 53, 0.4);
            background: var(--bg-card-hover);
        }

        .form-card label {
            display: block;
            font-size: 11px;
            color: var(--accent-gold-bright);
            text-transform: uppercase;
            margin-bottom: 8px;
            font-weight: 700;
            letter-spacing: 0.6px;
        }

        .inline-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .conditional-box {
            display: none;
            margin-top: 10px;
            padding: 12px;
            background: var(--accent-gold-dim);
            border-left: 2px solid var(--accent-gold);
            border-radius: 6px;
        }

        .measures-badge {
            margin-top: 8px;
            font-size: 12px;
            color: var(--success);
            font-weight: 600;
        }

        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-muted);
            cursor: pointer;
        }

        .checkbox-row input {
            width: auto;
            accent-color: var(--accent-gold);
        }

        .btn-save-all {
            background: linear-gradient(135deg, var(--accent-gold-bright), var(--accent-gold));
            color: #14120a;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            font-weight: 800;
            margin-top: 18px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 13px;
            box-shadow: 0 8px 20px -6px rgba(217, 169, 53, 0.4);
            transition: filter 0.15s ease, transform 0.1s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-save-all:hover { filter: brightness(1.06); }
        .btn-save-all:active { transform: scale(0.99); }

        /* --- NAVBAR INFERIOR --- */
        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 72px;
            background-color: rgba(10, 10, 11, 0.9);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-top: 1px solid var(--border-soft);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
            padding: 0 2px;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-faint);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 8.5px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            gap: 5px;
            flex: 1;
            min-width: 0;
            white-space: nowrap;
            transition: color 0.15s ease;
        }

        .nav-item.active { color: var(--accent-gold-bright); }

        /* --- LOGIN OVERLAY --- */
        #login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-primary);
            background-image:
                radial-gradient(circle at 50% 0%, rgba(217, 169, 53, 0.08), transparent 50%);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-logo {
            height: 40px;
            width: auto;
            margin-bottom: 28px;
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border-soft);
            padding: 32px 28px;
            border-radius: 16px;
            width: 100%;
            max-width: 360px;
            text-align: center;
            box-shadow: var(--shadow-lg);
        }

        .login-card p.subtitle {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 22px;
            letter-spacing: 0.3px;
        }

        /* --- ADMIN PANEL STYLES --- */
        .user-manager-card {
            background: var(--bg-card);
            border: 1px solid var(--border-soft);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .user-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .user-role-tag {
            font-size: 9px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 700;
            margin-left: 6px;
        }

        .permission-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 6px;
            margin-top: 8px;
        }

        .permission-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-muted);
            background: var(--bg-elevated);
            padding: 8px;
            border-radius: 6px;
        }

        .permission-item input {
            width: auto;
            accent-color: var(--accent-gold);
        }

        .btn-logout {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 5px 10px;
            border-radius: 7px;
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            position: relative;
        }

        .btn-logout:hover {
            border-color: var(--text-muted);
            color: var(--text-main);
        }

        /* --- NOTIFICACIONES --- */
        .notif-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--danger);
            color: white;
            font-size: 9px;
            font-weight: 700;
            min-width: 15px;
            height: 15px;
            border-radius: 999px;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 0 3px;
            line-height: 1;
        }

        .notif-item {
            background: var(--bg-elevated);
            border-left: 2px solid var(--accent-gold);
            border-radius: 6px;
            padding: 10px 12px;
            margin-bottom: 8px;
            cursor: pointer;
        }

        .notif-item .sr-field {
            display: flex;
            justify-content: space-between;
        }

        /* --- MODAL DE EVENTO (crear / gestionar accesos) --- */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(5, 5, 6, 0.75);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 3000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-card {
            background: var(--bg-card);
            border: 1px solid var(--border-soft);
            border-radius: 16px;
            padding: 24px;
            width: 100%;
            max-width: 400px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
        }

        .modal-card h3 {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 18px;
            color: var(--accent-gold-bright);
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 18px;
        }

        .modal-actions .btn-logout,
        .modal-actions .btn-add-event {
            flex: 1;
            padding: 12px;
            text-align: center;
        }

        /* --- CAMBIO DE CONTRASEÑA (panel admin) --- */
        .password-row {
            display: flex;
            gap: 6px;
            margin-top: 10px;
        }

        .password-row input {
            flex: 1;
        }

        .password-row .btn-add-event {
            white-space: nowrap;
        }

        /* --- VISTA DE EVENTOS (lista / calendario / buscador) --- */
        .view-toggle-row {
            display: flex;
            gap: 8px;
            margin: 4px 0 16px;
        }

        .view-toggle-btn {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg-elevated);
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .view-toggle-btn.active {
            border-color: var(--accent-gold);
            color: var(--accent-gold-bright);
            background: var(--accent-gold-dim);
        }

        .event-card {
            background: var(--bg-card);
            border: 1px solid var(--border-soft);
            border-radius: 12px;
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: border-color 0.15s ease, background 0.15s ease;
        }

        .event-card:hover {
            border-color: rgba(217, 169, 53, 0.4);
            background: var(--bg-card-hover);
        }

        .event-card-name {
            font-weight: 700;
            font-size: 14px;
        }

        .event-card-date {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .search-result-item {
            background: var(--bg-elevated);
            border-left: 2px solid var(--accent-gold);
            border-radius: 6px;
            padding: 10px 12px;
            margin-bottom: 8px;
            cursor: pointer;
        }

        .sr-event { font-size: 12px; font-weight: 700; color: var(--accent-gold-bright); }
        .sr-field { font-size: 10px; color: var(--text-muted); text-transform: uppercase; margin: 2px 0; letter-spacing: 0.4px; }
        .sr-snippet { font-size: 12px; color: var(--text-main); word-break: break-word; }

        .empty-hint {
            font-size: 12px;
            color: var(--text-muted);
            text-align: center;
            padding: 20px 0;
        }

        /* Calendario */
        .cal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .cal-nav-btn {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            color: var(--text-main);
            border-radius: 8px;
            width: 32px;
            height: 32px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .cal-month-label {
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }

        .cal-daylabel {
            font-size: 10px;
            color: var(--text-faint);
            text-align: center;
            text-transform: uppercase;
            padding: 4px 0;
        }

        .cal-day {
            aspect-ratio: 1;
            border-radius: 8px;
            background: var(--bg-elevated);
            border: 1px solid var(--border-soft);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            color: var(--text-muted);
        }

        .cal-day.has-events {
            border-color: var(--accent-gold);
            color: var(--text-main);
            cursor: pointer;
            font-weight: 700;
        }

        .cal-day.empty {
            background: transparent;
            border: none;
        }

        .cal-day-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--accent-gold-bright);
            margin-top: 2px;
        }

        .cal-day-events {
            margin-top: 14px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
    </style>
</head>
<body>

    <div id="login-overlay">
        <img src="logo.png" alt="FestivalYa" class="login-logo">
        <div class="login-card">
            <p class="subtitle">Gestión Técnica de Eventos</p>
            <div style="display: flex; flex-direction: column; gap: 15px;">
                <input type="text" id="login_user" placeholder="Usuario">
                <input type="password" id="login_pass" placeholder="Contraseña">
                <button class="btn-save-all" style="margin-top: 0;" onclick="handleLogin()">Entrar</button>
            </div>
            <p id="login_error" style="color: var(--danger); font-size: 12px; margin-top: 15px; display: none;">Credenciales incorrectas</p>
        </div>
    </div>

    <header>
        <div class="logo-row">
            <img src="logo.png" alt="FestivalYa" class="logo-img">
            <div style="display: flex; gap: 8px; align-items: center;">
                <button class="btn-logout" onclick="openNotificationsPanel()">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                    <span id="notif_badge" class="notif-badge">0</span>
                </button>
                <button class="btn-logout" onclick="logout()">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    Salir
                </button>
                <button id="admin_access_btn" class="btn-danger-sm" style="background: var(--accent-gold-dim); color: var(--accent-gold-bright); border-color: rgba(217,169,53,0.35);" onclick="openEventAccessModal()">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-5.5 5.5"></path><path d="M15 8l3 3"></path><path d="M9.5 13.5a5 5 0 1 1-7 7 5 5 0 0 1 7-7z"></path><path d="M13 10l3 3"></path></svg>
                    Accesos
                </button>
                <button id="admin_delete_btn" class="btn-danger-sm" onclick="deleteCurrentEvent()">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                    Eliminar
                </button>
            </div>
        </div>
        <div class="event-selector-zone">
            <select id="eventSelect" onchange="loadEventData()">
                </select>
            <button id="admin_add_event_btn" class="btn-add-event" onclick="openCreateEventModal()">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                Nuevo
            </button>
        </div>
    </header>

    <div id="tab_eventos" class="app-page active">
        <h2>Eventos</h2>
        <div class="form-card">
            <label>Buscar en todos los eventos</label>
            <input type="text" id="global_search_input" placeholder="Escribí una palabra clave..." oninput="performGlobalSearch(this.value)">
        </div>

        <div id="search_results_wrap" style="display:none; margin-top: 14px;">
            <div id="search_results"></div>
        </div>

        <div id="events_browser" style="margin-top: 16px;">

        async function loadAllData() {
            const [{ data: users, error: usersErr }, { data: events, error: eventsErr }, { data: escenarios, error: escErr }] = await Promise.all([
                sb.from('app_users').select('*'),
                sb.from('events').select('*'),
                sb.from('escenarios').select('*')
            ]);

            if (usersErr || eventsErr || escErr) {

                return;
            }

            usersCache = {};
            (users || []).forEach(u => {
                usersCache[u.username] = {
                    password: u.password,
                    role: u.role,
                    allowedEvents: u.allowed_events || [],
                    lastSeenNotifications: u.last_seen_notifications
                };
            });

            eventsCache = {};
            (events || []).forEach(e => { eventsCache[e.id] = e; });

            masterEscenarios = {};
            (escenarios || []).forEach(e => { masterEscenarios[e.id] = { name: e.name, measures: e.measures }; });
        }

            const div = document.createElement('div');
            div.innerText = str == null ? '' : String(str);
            return div.innerHTML;

                if (!realtimeSubscribed) {
                    subscribeToActivity();
                    realtimeSubscribed = true;
                }
            } else {
                overlay.style.display = 'flex';
            }
        }

            const user = document.getElementById('login_user').value.trim();
            const pass = document.getElementById('login_pass').value;
            const error = document.getElementById('login_error');

            const { data, error: err } = await sb.from('app_users').select('*').eq('username', user).maybeSingle();

            if (!err && data && data.password === pass) {
                currentUser = user;
                sessionStorage.setItem('festivalya_user', user);
                error.style.display = 'none';
                await checkAuth();
            } else {
                error.style.display = 'block';

        async function adminChangePassword(username) {

            if (!newPass) { alert("Introduce una nueva contraseña."); return; }

            const { error } = await sb.from('app_users').update({ password: newPass }).eq('username', username);

        async function changeOwnPassword() {
            const newPass = document.getElementById('perfil_new_password').value.trim();
            const confirmPass = document.getElementById('perfil_confirm_password').value.trim();

            if (!newPass || !confirmPass) { alert("Completa ambos campos de contraseña."); return; }
            if (newPass !== confirmPass) { alert("Las contraseñas no coinciden."); return; }

            const { error } = await sb.from('app_users').update({ password: newPass }).eq('username', currentUser);
            if (error) { alert("Error actualizando contraseña: " + error.message); return; }

            usersCache[currentUser].password = newPass;
            document.getElementById('perfil_new_password').value = "";
            document.getElementById('perfil_confirm_password').value = "";
            alert("Contraseña actualizada correctamente.");

        async function toggleUserPermission(username, eventId, isAllowed) {
            const user = usersCache[username];
            if (!user) return;

            let allowed = user.allowedEvents ? [...user.allowedEvents] : [];
            const already = allowed.includes(eventId);
            if (isAllowed === already) return;

            if (isAllowed) {
                allowed.push(eventId);
            } else {
                allowed = allowed.filter(id => id !== eventId);
            }

            const { error } = await sb.from('app_users').update({ allowed_events: allowed }).eq('username', username);
            if (error) {
                alert("Error actualizando permisos: " + error.message);
                return;
            }

            user.allowedEvents = allowed;
            if (username === currentUser) {
                updateEventSelect();
            }
        }

                hasUsers = true;

        function canUserSeeEvent(eventId) {
            const user = usersCache[currentUser];
            if (!user) return false;
            if (user.role === 'admin') return true;
            return !!(user.allowedEvents && user.allowedEvents.includes(eventId));
        }

        function getVisibleEvents() {
            return Object.values(eventsCache).filter(e => canUserSeeEvent(e.id));
        }

        function updateEventSelect() {
            const select = document.getElementById('eventSelect');
            select.innerHTML = '';

            for (const key in eventsCache) {
                if (!canUserSeeEvent(key)) continue;

                const opt = document.createElement('option');
                opt.value = key;
                opt.innerText = eventsCache[key].name;
                if(key === currentEvent) opt.selected = true;
                select.appendChild(opt);
            }

            const selectedOpt = select.querySelector(`option[value="${currentEvent}"]`);
            if (!selectedOpt && select.options.length > 0) {
                currentEvent = select.options[0].value;
                select.value = currentEvent;
                loadEventData();
            } else if (select.options.length === 0) {
                currentEvent = "";
                allFields.forEach(f => {

                    if (el) el.value = "";
                });

            if (eventsView === 'calendar') renderEventsCalendarView();
            else renderEventsListView();

        async function deleteCurrentEvent() {
            const currentId = currentEvent;
            if(!eventsCache[currentId]) return;

            if(!confirm(`¿Estás seguro de eliminar el evento "${eventsCache[currentId].name}"?`)) return;

            const eventName = eventsCache[currentId].name;

            const { error } = await sb.from('events').delete().eq('id', currentId);
            if (error) {
                alert("Error eliminando evento: " + error.message);
                return;
            }

            await logActivity(currentId, eventName, 'delete', 'Eliminó el evento');

            const affectedUsers = Object.entries(usersCache).filter(([, u]) => u.allowedEvents && u.allowedEvents.includes(currentId));
            await Promise.all(affectedUsers.map(([username, u]) => {
                const allowed = u.allowedEvents.filter(id => id !== currentId);
                return sb.from('app_users').update({ allowed_events: allowed }).eq('username', username);
            }));

            await loadAllData();
            const keys = Object.keys(eventsCache);
            currentEvent = keys.length > 0 ? keys[0] : "";
            updateEventSelect();
            if(currentEvent) loadEventData();

            renderAdminPanel();
            refreshEventsBrowser();
        }

        function loadEventData() {
            const select = document.getElementById('eventSelect');
            if(!select.value) return;
            currentEvent = select.value;

            const event = eventsCache[currentEvent];

            allFields.forEach(f => {
                const element = document.getElementById(f);
                if (element) {
                    element.value = event[fieldMap[f]] || "";
                }
            });

            handleEscenarioChange();
            toggleRiderEmpresa();
        }

        async function saveAllFestivalData(e) {
            e.preventDefault();
            const currentId = currentEvent;
            if(!currentId || !eventsCache[currentId]) return;

            const before = { ...eventsCache[currentId] };
            const updateObj = {};
            allFields.forEach(f => {
                const element = document.getElementById(f);
                if (element) {
                    updateObj[fieldMap[f]] = element.value;
                }
            });

            const { error } = await sb.from('events').update(updateObj).eq('id', currentId);
            if (error) {
                alert("Error guardando: " + error.message);
                return;
            }

            const changedLabels = allFields
                .filter(f => (before[fieldMap[f]] || '') !== (updateObj[fieldMap[f]] || ''))
                .map(f => FIELD_META[f] ? FIELD_META[f].label : f);

            Object.assign(eventsCache[currentId], updateObj);

            if (changedLabels.length > 0) {
                await logActivity(currentId, eventsCache[currentId].name, 'update', 'Modificó: ' + changedLabels.join(', '));
            }

            alert("¡Datos del evento guardados con éxito en FestivalYa!");
        }

        async function submitEventModal() {
            const dateInput = document.getElementById('event_modal_date');
            const checkboxes = document.querySelectorAll('#event_modal_users_list input[type=checkbox]');
            let eventId = eventModalEditingId;

            if (eventModalMode === 'create') {
                const name = document.getElementById('event_modal_name').value.trim();
                if (!name) { alert("Por favor, introduce un nombre para el evento."); return; }

                eventId = "fest_" + Date.now();
                const newEvent = { id: eventId, name, rider: "no", efectos: "no", pirotecnia: "no", event_date: dateInput.value || null };
                const { error } = await sb.from('events').insert(newEvent);
                if (error) { alert("Error creando evento: " + error.message); return; }
            } else {
                const { error } = await sb.from('events').update({ event_date: dateInput.value || null }).eq('id', eventId);
                if (error) { alert("Error actualizando el evento: " + error.message); return; }
            }

            const updates = [];
            checkboxes.forEach(cb => {
                updates.push(toggleUserPermission(cb.dataset.username, eventId, cb.checked));
            });
            await Promise.all(updates);

            const wasCreate = eventModalMode === 'create';
            const eventName = wasCreate ? document.getElementById('event_modal_name').value.trim() : eventsCache[eventId].name;
            await logActivity(eventId, eventName, wasCreate ? 'create' : 'update', wasCreate ? 'Creó el evento' : 'Actualizó la fecha y/o los accesos del evento');

            closeEventModal();
            await loadAllData();

            if (wasCreate) currentEvent = eventId;
            updateEventSelect();
            if (currentEvent) loadEventData();
            renderAdminPanel();
            refreshEventsBrowser();
        }

        // --- NOTIFICACIONES ---

                .map(([username]) => username);

            await sb.from('activity_log').insert({
                event_id: eventId,
                event_name: eventName,
                username: currentUser,
                action,
                detail,
                visible_to: visibleTo
            });

        async function loadNotifications() {
            const { data, error } = await sb.from('activity_log').select('*').order('created_at', { ascending: false }).limit(50);
            if (error) { console.error(error); return; }
            activityLog = data || [];
            updateNotificationBadge();
        }

        function isNotificationRelevant(entry) {
            if (entry.username === currentUser) return false;
            const user = usersCache[currentUser];
            if (!user) return false;
            if (user.role === 'admin') return true;
            return !!(entry.visible_to && entry.visible_to.includes(currentUser));
        }

        function getRelevantNotifications() {
            return activityLog.filter(isNotificationRelevant);
        }

        function updateNotificationBadge() {
            const badge = document.getElementById('notif_badge');
            if (!badge) return;

            const user = usersCache[currentUser];
            const lastSeen = user && user.lastSeenNotifications ? new Date(user.lastSeenNotifications) : new Date(0);
            const unread = getRelevantNotifications().filter(n => new Date(n.created_at) > lastSeen).length;

            if (unread > 0) {
                badge.style.display = 'flex';
                badge.innerText = unread > 9 ? '9+' : String(unread);
            } else {
                badge.style.display = 'none';
            }
        }

        function timeAgo(dateStr) {
            const diffMs = Date.now() - new Date(dateStr).getTime();
            const mins = Math.floor(diffMs / 60000);
            if (mins < 1) return 'ahora';
            if (mins < 60) return `hace ${mins} min`;
            const hours = Math.floor(mins / 60);
            if (hours < 24) return `hace ${hours} h`;
            const days = Math.floor(hours / 24);
            return `hace ${days} d`;
        }

        function renderNotificationsList() {
            const container = document.getElementById('notif_list');
            const relevant = getRelevantNotifications();

            if (relevant.length === 0) {

            container.innerHTML = relevant.map(n => `

                    <div class="sr-snippet">${escapeHtml(n.detail || '')}</div>
                </div>
            `).join('');
        }

        function formatDateEs(dateStr) {
            const d = new Date(dateStr + 'T00:00:00');

        }

        function renderEventsListView() {
            const container = document.getElementById('events_list_view');
            if (!container) return;
            container.innerHTML = '';

            const events = getVisibleEvents().sort((a, b) => {
                if (!a.event_date && !b.event_date) return a.name.localeCompare(b.name);
                if (!a.event_date) return 1;
                if (!b.event_date) return -1;
                return new Date(a.event_date) - new Date(b.event_date);
            });

            if (events.length === 0) {
                container.innerHTML = '<p class="empty-hint">No tenés eventos disponibles todavía.</p>';
                return;
            }

            events.forEach(event => {
                const card = document.createElement('div');
                card.className = 'event-card';
                const dateLabel = event.event_date ? formatDateEs(event.event_date) : 'Sin fecha asignada';
                card.innerHTML = `
                    <div>
                        <div class="event-card-name">${escapeHtml(event.name)}</div>
                        <div class="event-card-date">${ICON_CALENDAR} ${dateLabel}</div>
                    </div>
                    ${ICON_CHEVRON}
                `;
                card.onclick = () => openEventById(event.id, 'tab_produccion');
                container.appendChild(card);
            });
        }

        function renderEventsCalendarView() {
            if (!calendarCursor) {
                const now = new Date();
                calendarCursor = { year: now.getFullYear(), month: now.getMonth() };
            }

            const container = document.getElementById('events_calendar_view');
            if (!container) return;

            const { year, month } = calendarCursor;
            const monthNames = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

            const eventsByDay = {};
            getVisibleEvents().forEach(e => {
                if (!e.event_date) return;
                const d = new Date(e.event_date + 'T00:00:00');
                if (d.getFullYear() === year && d.getMonth() === month) {
                    const day = d.getDate();
                    if (!eventsByDay[day]) eventsByDay[day] = [];
                    eventsByDay[day].push(e.id);
                }
            });

            const firstDay = new Date(year, month, 1);
            const startOffset = (firstDay.getDay() + 6) % 7;
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            let html = `
                <div class="cal-header">
                    <button type="button" class="cal-nav-btn" onclick="shiftCalendar(-1)">${ICON_CHEVRON.replace('9 18 15 12 9 6', '15 18 9 12 15 6')}</button>
                    <span class="cal-month-label">${monthNames[month]} ${year}</span>
                    <button type="button" class="cal-nav-btn" onclick="shiftCalendar(1)">${ICON_CHEVRON}</button>
                </div>
                <div class="cal-grid">
                    ${['L','M','X','J','V','S','D'].map(d => `<div class="cal-daylabel">${d}</div>`).join('')}
            `;

            for (let i = 0; i < startOffset; i++) html += `<div class="cal-day empty"></div>`;

            for (let day = 1; day <= daysInMonth; day++) {
                const hasEvents = !!eventsByDay[day];
                html += `<div class="cal-day ${hasEvents ? 'has-events' : ''}" ${hasEvents ? `onclick="showCalendarDay(${day})"` : ''}>
                    <span>${day}</span>${hasEvents ? '<div class="cal-day-dot"></div>' : ''}
                </div>`;
            }

            html += `</div><div id="cal_day_events" class="cal-day-events"></div>`;
            container.innerHTML = html;
            container.dataset.eventsByDay = JSON.stringify(eventsByDay);
        }

        function shiftCalendar(delta) {
            let { year, month } = calendarCursor;
            month += delta;
            if (month < 0) { month = 11; year -= 1; }
            if (month > 11) { month = 0; year += 1; }
            calendarCursor = { year, month };
            renderEventsCalendarView();
        }

        function showCalendarDay(day) {
            const container = document.getElementById('events_calendar_view');
            const map = JSON.parse(container.dataset.eventsByDay || '{}');
            const ids = map[day] || [];
            const box = document.getElementById('cal_day_events');
            box.innerHTML = ids.map(id => {
                const e = eventsCache[id];
                if (!e) return '';
                return `<div class="event-card" onclick="openEventById('${id}','tab_produccion')">
                    <div class="event-card-name">${escapeHtml(e.name)}</div>
                    ${ICON_CHEVRON}
                </div>`;
            }).join('');
        }

        function performGlobalSearch(query) {
            const q = query.trim().toLowerCase();
            const resultsWrap = document.getElementById('search_results_wrap');
            const resultsContainer = document.getElementById('search_results');
            const browser = document.getElementById('events_browser');

            if (!q) {
                resultsWrap.style.display = 'none';
                browser.style.display = 'block';
                return;
            }

            browser.style.display = 'none';
            resultsWrap.style.display = 'block';

            const results = [];
            getVisibleEvents().forEach(event => {
                if (event.name && event.name.toLowerCase().includes(q)) {
                    results.push({ eventId: event.id, eventName: event.name, field: 'Nombre del Evento', snippet: event.name, tab: 'tab_produccion' });
                }
                for (const domId in FIELD_META) {
                    const col = fieldMap[domId];
                    const val = event[col];
                    if (val && String(val).toLowerCase().includes(q)) {
                        results.push({ eventId: event.id, eventName: event.name, field: FIELD_META[domId].label, snippet: String(val), tab: FIELD_META[domId].tab });
                    }
                }
            });

            if (results.length === 0) {
                resultsContainer.innerHTML = `<p class="empty-hint">Sin resultados para "${escapeHtml(query)}".</p>`;
                return;
            }

            resultsContainer.innerHTML = results.map(r => `
                <div class="search-result-item" onclick="openEventById('${r.eventId}','${r.tab}')">
                    <div class="sr-event">${escapeHtml(r.eventName)}</div>
                    <div class="sr-field">${escapeHtml(r.field)}</div>
                    <div class="sr-snippet">${escapeHtml(r.snippet)}</div>
                </div>
            `).join('');
        }

        function switchTab(tabId) {
            const pages = document.querySelectorAll('.app-page');
            pages.forEach(p => p.classList.remove('active'));
            const navs = document.querySelectorAll('.nav-item');
            navs.forEach(n => n.classList.remove('active'));

            document.getElementById(tabId).classList.add('active');
            const navBtn = document.querySelector(`.nav-item[data-tab="${tabId}"]`);
            if (navBtn) navBtn.classList.add('active');
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        // Arranque Inicial
        checkAuth();
    </script>
</body>
</html>
